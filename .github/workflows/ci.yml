name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Lint, test and build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check forbidden tracked files
        shell: bash
        run: |
          blocked_files="$(
            git ls-files |
              grep -E '(^|/)\.env($|\.)|(^|/)(whatsapp-auth|auth_info|session-data|baileys_auth_info)(/|$)|\.(pem|key|p12|pfx)$' |
              grep -vE '(^|/)\.env\.example$' || true
          )"

          if [ -n "$blocked_files" ]; then
            echo "Forbidden files are tracked:"
            echo "$blocked_files"
            exit 1
          fi

          echo "No forbidden files are tracked."

      - name: Install root dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Test backend
        working-directory: backend
        run: npm test

      - name: Audit backend runtime dependencies
        working-directory: backend
        run: npm audit --omit=dev --audit-level=high

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Test frontend
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Audit frontend runtime dependencies
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high
